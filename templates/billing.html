<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Billing System</title>
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
    padding:0;
}
h2{
    text-align:center;
    background:black;
    color:gold;
    padding:10px;
    margin:0;
}
.container{
    display:flex;
    padding:15px;
    gap:15px;
}

/* Left form box */
.form_box{
    width:35%;
    background:#ddd;
    padding:15px;
    border-radius:8px;
}
.form_box input,
.form_box select{
    width:95%;
    padding:6px;
    margin:4px 0 10px 0;
}
.buttons{
    text-align:center;
    margin-top:10px;
}
.buttons button{
    background-color: red;
    padding: 8px 14px;
    color:black;
    border:none;
    cursor:pointer;
    border-radius: 10%;
    font-weight: bold;
}
.buttons button:hover{
    background-color: green;
}

/* Right table box */
.table-box{
    width:65%;
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    overflow-x:auto;
}
#billingTable{
    width:100%;
    border-collapse:collapse;
    text-align:center;
}
#billingTable th, #billingTable td{
    border:1px solid black;
    padding:6px;
}
#billingTable th{
    background:#1e3b8a;
    color:white;
}
#billingTable tr:nth-child(even){
    background:#f2f2f2;
}
button.action-btn{
    padding:4px 10px;
    margin:2px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}
button.edit-btn{background:orange;}
button.delete-btn{background:red; color:white;}
button.edit-btn:hover{background:green;}
button.delete-btn:hover{background:black;}
</style>
</head>
<body>

<h2>BILLING DETAILS</h2>

<div class="container">
    <div class="form_box">
        <input type="hidden" id="bill_id">
        <label>Customer ID</label>
        <select id="Customer_ID">
            <option value="">-- Select Customer --</option>
            {% for customer in customer_info %}
            <option value="{{ customer[0] }}">{{ customer[0] }}</option>
            {% endfor %}
        </select>

        <label>Room No</label>
        <input type="text" id="Room_no" readonly>

        <label>Room Price</label>
        <input type="number" id="room_price" readonly>

        <label>Total Days</label>
        <input type="number" id="total_days" value="1">

        <label>Room Amount</label>
        <input type="number" id="room_amount" readonly>

        <label>Tax %</label>
        <input type="number" id="tax_percent" value="12">

        <label>Tax Amount</label>
        <input type="number" id="tax_amount" readonly>

        <label>Extra Charges</label>
        <input type="number" id="extra_charges" value="0">

        <label>Discount</label>
        <input type="number" id="discount" value="0">

        <label>Grand Total</label>
        <input type="number" id="grand_total" readonly>

        <div class="buttons">
            <button onclick="GenerateBill()">Generate Bill</button>
            <button onclick="addBilling()">Save Billing</button>
        </div>
    </div>

    <div class="table-box">
        <table id="billingTable">
            <thead>
                <tr>
                    <th>Customer ID</th>
                    <th>Room No</th>
                    <th>Days</th>
                    <th>Price</th>
                    <th>Room Amount</th>
                    <th>Tax%</th>
                    <th>Tax Amt</th>
                    <th>Extra</th>
                    <th>Discount</th>
                    <th>Grand Total</th>
                    <th>Bill Date</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
// Auto-fill Room No & Price
document.getElementById("Customer_ID").addEventListener("change", function(){
    let cid = this.value;
    let roomNoInput = document.getElementById("Room_no");
    let roomPriceInput = document.getElementById("room_price");

    if(!cid){
        roomNoInput.value = "";
        roomPriceInput.value = 0;
        return;
    }

    fetch("/get_customer_room/"+cid)
    .then(res => res.json())
    .then(data => {
        roomNoInput.value = data.RoomNo || "";
        roomPriceInput.value = (data.room_price !== undefined && data.room_price !== null) ? data.room_price : 0;
    })
    .catch(err => {
        console.error(err);
        roomNoInput.value = "";
        roomPriceInput.value = 0;
    });
});

// Generate bill amounts
function GenerateBill(){
    let days = Number(document.getElementById("total_days").value);
    let price = Number(document.getElementById("room_price").value);
    let room_amount = days*price;
    document.getElementById("room_amount").value = room_amount;

    let tax_percent = Number(document.getElementById("tax_percent").value);
    let tax_amount = room_amount*(tax_percent/100);
    document.getElementById("tax_amount").value = tax_amount;

    let extra = Number(document.getElementById("extra_charges").value);
    let discount = Number(document.getElementById("discount").value);
    let grand_total = room_amount+tax_amount+extra-discount;
    document.getElementById("grand_total").value = grand_total;
}

// Add billing
function addBilling(){
    let data={
        Customer_ID: document.getElementById("Customer_ID").value,
        total_days: document.getElementById("total_days").value,
        room_price: document.getElementById("room_price").value,
        room_amount: document.getElementById("room_amount").value,
        tax_percent: document.getElementById("tax_percent").value,
        tax_amount: document.getElementById("tax_amount").value,
        extra_charges: document.getElementById("extra_charges").value,
        discount: document.getElementById("discount").value,
        grand_total: document.getElementById("grand_total").value
    };
    fetch("/add_billing",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        loadBilling();
    })
    .catch(err=>console.error(err));
}

// Load all billing
function loadBilling(){
    fetch("/get_billing")
    .then(res=>res.json())
    .then(data=>{
        let tbody=document.querySelector("#billingTable tbody");
        tbody.innerHTML="";
        data.forEach(b=>{
            let tr=document.createElement("tr");
            tr.innerHTML=`
            <td>${b.Customer_ID}</td>
            <td>${b.RoomNo || "-"}</td>
            <td>${b.total_days}</td>
            <td>${b.room_price}</td>
            <td>${b.room_amount}</td>
            <td>${b.tax_percent}</td>
            <td>${b.tax_amount}</td>
            <td>${b.extra_charges}</td>
            <td>${b.discount}</td>
            <td>${b.grand_total}</td>
            <td>${b.bill_date}</td>
            <td><button class="action-btn edit-btn" onclick="editBilling(${b.bill_id})">Edit</button></td>
            <td><button class="action-btn delete-btn" onclick="deleteBilling(${b.bill_id})">Delete</button></td>
            `;
            tbody.appendChild(tr);
        });
    });
}

// Delete billing
function deleteBilling(id){
    if(!confirm("Delete this bill?")) return;
    fetch("/delete_billing/"+id)z
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        loadBilling();
    });
}

// Initial load
loadBilling();
</script>
</body>
</html>
