<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Module</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
}

.container{
    display:flex;
    height:100%;
}

/* Left Form */
.form-box{
    width:40%;
    background:#ddd;
    padding:15px;
}

.form-box h2{
    text-align:center;
    background:black;
    color:gold;
    padding:8px;
}

.form-box input,
.form-box select{
    width:95%;
    padding:6px;
    margin:4px 0;
}

.buttons{
    text-align:center;
    margin-top:10px;
}

.buttons button{
    padding:8px 14px;
    margin:4px;
    background:red;
    color:black;
    border:none;
    cursor:pointer;
    border-radius: 10%;
    font-weight: bold;
    
}
.buttons button:hover{
    background-color:green;
}

/* Right section */
.table-box {
    width: 60%;
    background-color: #ffffff;  
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    overflow-x: auto;
    scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE and Edge */

}
.table-box::-webkit-scrollbar{
    display: hidden;
}


.search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    padding: 8px 12px;
    background-color: #f5f5f5;
    border-radius: 8px;
}

.search input, .search select{
    padding:5px;
}

.search button{
    padding:6px 12px;
    background:red;
    color:black;
    font-weight: bold;
    border:none;

}

.search button:hover{
    background-color: green;
}
#customerTable{
    width: 100%;
    border-collapse: collapse;
    text-align: center;
}

#customerTable th,
#customerTable td {
    border: 1px solid black;
    padding: 6px;
}

#customerTable th {
    background-color: #1e3b8a;
    color: #fff;
}

#customerTable tr:nth-child(even){
    background-color: #f2f2f2;
}


</style>
</head>

<body>

<h2 style="text-align:center;background:black;color:gold;padding:10px;">
ADD STAFF DETAILS
</h2>

<div class="container">

<div class="form-box">

    <input type ="hidden" id="Id">

    <label> First name</label>
    <input type="text" id="FirstName">

     <label>Last name</label>
    <input type="text" id="LastName">

    <label>Father Name</label>
    <input type="text" id="FatherName">

      <label>Mother  Name</label>
    <input type="text" id="MotherName">

     <label>Role</label>
    <select id="Role">
        <option>Manager</option>
        <option>Room-Service</option>
        <option>Receptitionist</option>
        <option>Cleaning</option>
        <option>Maintenence</option>
    </select>
    
    <label>Gender</label>
    <select id="Gender">
        <option>Male</option>
        <option>Female</option>
        <option>other</option>
    </select>


    <label>Mobile</label>
    <input type="text" id="Mobile">

    <label>Email</label>
    <input type="email" id="Email">

    <label>Nationality</label>
    <input type="text" id="Nationality">

    <label>ID Proof</label>
    <select id="IdProof">
        <option>citizenship</option>
        <option>Driving Lisence</option>
        <option>Passport</option>
    </select>

    <label>ID-Number</label>
    <input type="text" id="IdNumber">

    <label>Address</label>
    <input type="text" id="Address">

    <div class="buttons">
        <button type="button" class="btn" onclick="add()">Save</button>
        <button  type="button" onclick="update()">Update & save</button>
      
    </div>
</div>

<div class="table-box">
    <div class="search">
        <select id="Field">
            <option>Mobile</option>
            <option>Name</option>
            <option> Role</option>
            
        </select>
        <input type="text" id="searchInput" placeholder="Search">
        <button type="button" onclick="searchStaff()"> Search</button>
        <button type="button" onclick="LoadData()">Show All</button>
    </div>
   <table id="customerTable">
                <thead>
                    <tr>
                        <th>FirstName</th>
                        <th>LastName</th>
                        <th>FatherName</th>
                        <th>MotherName</th>
                        <th>Role</th>
                        <th>Gender</th>
                        <th>Mobile</th>
                        <th>Email</th>
                        <th>Nationality</th>
                        <th>ID Proof</th>
                        <th>ID Number</th>
                        <th>Address</th>
                        <th> Update-staff</th>
                        <th> delete-staff</th>
                    </tr>
                </thead>
                <tbody>
                  
                </tbody>
            </table>
        </div>
    
</div>

</div>
<script>
// Add Staff
function add() {
    let data = {
        FirstName: document.getElementById("FirstName").value.trim(),
        LastName: document.getElementById("LastName").value.trim(),
        FatherName: document.getElementById("FatherName").value.trim(),
        MotherName: document.getElementById("MotherName").value.trim(),
        Role: document.getElementById("Role").value.trim(),
        Gender: document.getElementById("Gender").value.trim(),
        Mobile: document.getElementById("Mobile").value.trim(),
        Email: document.getElementById("Email").value.trim(),
        Nationality: document.getElementById("Nationality").value.trim(),
        IdProof: document.getElementById("IdProof").value.trim(),
        IdNumber: document.getElementById("IdNumber").value.trim(),
        Address: document.getElementById("Address").value.trim(),
    };

    fetch("/add_staff", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        LoadData();
    })
    .catch(err => console.error("Add error:", err));
}

// Load Staff Table
function LoadData() {
    fetch("/get_staff")
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("#customerTable tbody");
        tbody.innerHTML = "";
        data.forEach(staff => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${staff.FirstName}</td>
                <td>${staff.LastName}</td>
                <td>${staff.FatherName}</td>
                <td>${staff.MotherName}</td>
                <td>${staff.Role}</td>
                <td>${staff.Gender}</td>
                <td>${staff.Mobile}</td>
                <td>${staff.Email}</td>
                <td>${staff.Nationality}</td>
                <td>${staff.IdProof}</td>
                <td>${staff.IdNumber}</td>
                <td>${staff.Address}</td>
                <td><button onclick='fillForm(${JSON.stringify(staff)})'   onmouseover="this.style.background='green'; this.style.transform='scale(0.95)'"
    onmouseout="this.style.background='red'; this.style.transform='scale(1)'"
    style="
    width:70px;
      padding:8px 14px;
      margin:4px;
      background:red;
      color:black;
      border:none;
      cursor:pointer;
      border-radius:20%;
      font-weight:bold;
      transition:0.2s;
    " >Edit</button></td>
                <td><button onclick='deleteData(${staff.Id})'   onmouseover="this.style.background='green'; this.style.transform='scale(0.95)'"
    onmouseout="this.style.background='red'; this.style.transform='scale(1)'"
    style="
    width:70px;
      padding:8px 14px;
      margin:4px;
      background:red;
      color:black;
      border:none;
      cursor:pointer;
      border-radius:20%;
      font-weight:bold;
      transition:0.2s;
    ">Delete</button></td>
            `;
            tbody.appendChild(row);
        });
    })
    .catch(err => console.error("LoadData error:", err));
}

window.onload = LoadData;

// Fill form
function fillForm(staff) {
    document.getElementById("Id").value = staff.Id;
    document.getElementById("FirstName").value = staff.FirstName;
    document.getElementById("LastName").value = staff.LastName;
    document.getElementById("FatherName").value = staff.FatherName;
    document.getElementById("MotherName").value = staff.MotherName;
    document.getElementById("Role").value = staff.Role;
    document.getElementById("Gender").value = staff.Gender;
    document.getElementById("Mobile").value = staff.Mobile;
    document.getElementById("Email").value = staff.Email;
    document.getElementById("Nationality").value = staff.Nationality;
    document.getElementById("IdProof").value = staff.IdProof;
    document.getElementById("IdNumber").value = staff.IdNumber;
    document.getElementById("Address").value = staff.Address;
}

// Delete
function deleteData(Id) {
    if(confirm("ARE YOU SURE YOU WANT TO DELETE THIS STAFF?")) {
        fetch(`/delete_staff/${Id}`, { method: "DELETE" })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            LoadData();
        })
        .catch(err => console.error("Delete error:", err));
    }
}

// Update
function update() {
    let data = {
        Id: document.getElementById("Id").value,
        FirstName: document.getElementById("FirstName").value.trim(),
        LastName: document.getElementById("LastName").value.trim(),
        FatherName: document.getElementById("FatherName").value.trim(),
        MotherName: document.getElementById("MotherName").value.trim(),
        Role: document.getElementById("Role").value.trim(),
        Gender: document.getElementById("Gender").value.trim(),
        Mobile: document.getElementById("Mobile").value.trim(),
        Email: document.getElementById("Email").value.trim(),
        Nationality: document.getElementById("Nationality").value.trim(),
        IdProof: document.getElementById("IdProof").value.trim(),
        IdNumber: document.getElementById("IdNumber").value.trim(),
        Address: document.getElementById("Address").value.trim()
    };

    fetch("/update_staff", {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        LoadData();
    })
    .catch(err => console.error("Update error:", err));
}

// Search
function searchStaff() {
    const Field = document.getElementById("Field").value;
    const value = document.getElementById("searchInput").value.trim();

    if(!value) { alert("Please enter a search term"); return; }

    fetch("/search_staff", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ Field, value })
    })
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("#customerTable tbody");
        tbody.innerHTML = "";
        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="14">No data found</td></tr>`;
            return;
        }
        data.forEach(staff => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${staff.FirstName}</td>
                <td>${staff.LastName}</td>
                <td>${staff.FatherName}</td>
                <td>${staff.MotherName}</td>
                <td>${staff.Role}</td>
                <td>${staff.Gender}</td>
                <td>${staff.Mobile}</td>
                <td>${staff.Email}</td>
                <td>${staff.Nationality}</td>
                <td>${staff.IdProof}</td>
                <td>${staff.IdNumber}</td>
                <td>${staff.Address}</td>
                <td><button onclick='fillForm(${JSON.stringify(staff)})'>Edit</button></td>
                <td><button onclick='deleteData(${staff.Id})'>Delete</button></td>
            `;
            tbody.appendChild(row);
        });
    })
    .catch(err => console.error("Search error:", err));
}
</script>




</body>
</html>
