<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Management System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
}

/* LEFT IMAGE */

.left{
width:60%;
background-image:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.5)),
url("static/image/Deluxe-Room-Details-page.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:60px;
color:white;
}

.left h1{
font-size:40px;
margin-bottom:10px;
}

.left p{
font-size:18px;
opacity:0.9;
}

/* RIGHT SIDE */

.right{
width:40%;
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN CARD */

.login-container{
width:360px;
padding:40px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

/* LOGO */

.logo{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:50%;
    border:3px solid #2563eb;
    padding:3px;
    margin-bottom:15px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

/* TITLE */

.login-container h2{
margin-bottom:5px;
font-size:26px;
color:#111827;
}

.subtitle{
margin-bottom:25px;
color:#6b7280;
}

/* INPUT */

.input-group{
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid #d1d5db;
border-radius:6px;
outline:none;
transition:0.3s;
}

.input-group input:focus{
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

/* BUTTON */

.login-btn{
width:100%;
padding:12px;
background:#111827;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
background:#374151;
}

/* LINKS */

.forgot{
margin-top:10px;
font-size:13px;
color:#2563eb;
cursor:pointer;
}

#new{
margin-top:20px;
font-size:14px;
}

#register{
color:#ef4444;
font-weight:bold;
cursor:pointer;
}

#register:hover{
color:#16a34a;
}

/* MOBILE */

@media(max-width:900px){

.left{
display:none;
}

.right{
width:100%;
}

}

</style>
</head>

<body>

<!-- LEFT IMAGE SECTION -->

<div class="left">

<div>
<h1>Find Your Perfect Stay</h1>
<p>Manage hotel rooms, bookings and customers easily.</p>
</div>

</div>

<!-- RIGHT LOGIN -->

<div class="right">

<div class="login-container">

<!-- LOGO -->
<img src="static/image/new_circle.jpg"  class="logo">

<h2> UD Grand Hotel </h2>
<p class="subtitle">Admin Login</p>

<div class="input-group">
<input type="text" id="name" placeholder="Username">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
</div>

<button class="login-btn" id="loginBtn">Login</button>

<p class="forgot" id="forgot">Forgot Password?</p>

<p id="new">Don't have account? <span id="register">Register</span></p>

</div>

</div>

<script>

document.getElementById("loginBtn").addEventListener("click",function(){

let name=document.getElementById("name").value.trim();
let password=document.getElementById("password").value.trim();

if(!name || !password){
alert("Please fill all fields");
return;
}

fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:new URLSearchParams({
name:name,
password:password
})

})

.then(response=>response.text())

.then(data=>{

if(data==="success"){
window.location.href="/drashboard";
}else{
alert("Invalid name or password");
}

})

.catch(err=>console.error(err));

});

document.getElementById("forgot").addEventListener("click",function(){
window.location.href="/forgot";
});

document.getElementById("register").addEventListener("click",function(){
window.location.href="/register";
});

</script>

</body>
</html>
